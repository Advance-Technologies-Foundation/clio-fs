name: Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  release-artifacts:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Typecheck
        run: corepack pnpm check

      - name: Test
        run: corepack pnpm test

      - name: Build
        run: corepack pnpm build

      - name: Build release bundles
        run: node scripts/build-release-artifacts.mjs --version "${RELEASE_TAG}"

      - name: Archive Linux release bundle
        run: |
          mkdir -p .release-assets
          tar -C .release-artifacts -czf .release-assets/clio-fs-${RELEASE_TAG}-linux.tar.gz clio-fs-server-${RELEASE_TAG} clio-fs-client-${RELEASE_TAG}

      - name: Archive macOS release bundle
        run: |
          mkdir -p .release-assets
          tar -C .release-artifacts -czf .release-assets/clio-fs-${RELEASE_TAG}-macos.tar.gz clio-fs-server-${RELEASE_TAG} clio-fs-client-${RELEASE_TAG}

      - name: Archive Windows release bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .release-assets | Out-Null
          Compress-Archive -Path ".release-artifacts/clio-fs-server-$env:RELEASE_TAG", ".release-artifacts/clio-fs-client-$env:RELEASE_TAG" -DestinationPath ".release-assets/clio-fs-$env:RELEASE_TAG-windows.zip"

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: clio-fs-server-${{ github.ref_name }}
          path: .release-artifacts/clio-fs-server-${{ github.ref_name }}
          if-no-files-found: error

      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: clio-fs-client-${{ github.ref_name }}
          path: .release-artifacts/clio-fs-client-${{ github.ref_name }}
          if-no-files-found: error

      - name: Create or update GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "GitHub Release $RELEASE_TAG already exists."
          else
            gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --generate-notes
          fi

      - name: Resolve published timestamp
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          published_at="$(gh release view "$RELEASE_TAG" --json publishedAt --jq .publishedAt)"
          echo "RELEASE_PUBLISHED_AT=$published_at" >> "$GITHUB_ENV"

      - name: Generate release metadata
        run: node scripts/generate-release-metadata.mjs --version "${RELEASE_TAG}"

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$RELEASE_TAG" \
            .release-assets/clio-fs-${RELEASE_TAG}-windows.zip \
            .release-assets/clio-fs-${RELEASE_TAG}-macos.tar.gz \
            .release-assets/clio-fs-${RELEASE_TAG}-linux.tar.gz \
            .release-assets/SHA256SUMS \
            .release-assets/manifest.json \
            --clobber
