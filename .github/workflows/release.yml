name: Release

on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Semver version used for verification artifacts. Manual runs do not publish a GitHub Release.
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-artifacts:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
      PUBLISH_RELEASE: ${{ github.event_name == 'push' && 'true' || 'false' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Typecheck
        run: corepack pnpm check

      - name: Test
        run: corepack pnpm test

      - name: Build
        run: corepack pnpm build

      - name: Build release bundles
        run: node scripts/build-release-artifacts.mjs --version "${RELEASE_TAG}"

      - name: Archive Linux release bundle
        run: |
          mkdir -p .release-assets
          tar -C .release-artifacts -czf .release-assets/clio-fs-${RELEASE_TAG}-linux.tar.gz clio-fs-server-${RELEASE_TAG} clio-fs-client-${RELEASE_TAG}

      - name: Archive macOS release bundle
        run: |
          mkdir -p .release-assets
          tar -C .release-artifacts -czf .release-assets/clio-fs-${RELEASE_TAG}-macos.tar.gz clio-fs-server-${RELEASE_TAG} clio-fs-client-${RELEASE_TAG}

      - name: Archive Windows release bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .release-assets | Out-Null
          Compress-Archive -Path ".release-artifacts/clio-fs-server-$env:RELEASE_TAG", ".release-artifacts/clio-fs-client-$env:RELEASE_TAG" -DestinationPath ".release-assets/clio-fs-$env:RELEASE_TAG-windows.zip"

      - name: Upload server artifact
        uses: actions/upload-artifact@v5
        with:
          name: clio-fs-server-${{ env.RELEASE_TAG }}
          path: .release-artifacts/clio-fs-server-${{ env.RELEASE_TAG }}
          if-no-files-found: error

      - name: Upload client artifact
        uses: actions/upload-artifact@v5
        with:
          name: clio-fs-client-${{ env.RELEASE_TAG }}
          path: .release-artifacts/clio-fs-client-${{ env.RELEASE_TAG }}
          if-no-files-found: error

      - name: Create or update GitHub release
        if: ${{ env.PUBLISH_RELEASE == 'true' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "GitHub Release $RELEASE_TAG already exists."
          else
            gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --generate-notes
          fi

      - name: Resolve published timestamp
        if: ${{ env.PUBLISH_RELEASE == 'true' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          published_at="$(gh release view "$RELEASE_TAG" --json publishedAt --jq .publishedAt)"
          echo "RELEASE_PUBLISHED_AT=$published_at" >> "$GITHUB_ENV"

      - name: Generate release metadata
        if: ${{ env.PUBLISH_RELEASE == 'true' }}
        run: node scripts/generate-release-metadata.mjs --version "${RELEASE_TAG}"

      - name: Upload release assets
        if: ${{ env.PUBLISH_RELEASE == 'true' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$RELEASE_TAG" \
            .release-assets/clio-fs-${RELEASE_TAG}-windows.zip \
            .release-assets/clio-fs-${RELEASE_TAG}-macos.tar.gz \
            .release-assets/clio-fs-${RELEASE_TAG}-linux.tar.gz \
            .release-assets/SHA256SUMS \
            .release-assets/manifest.json \
            --clobber
